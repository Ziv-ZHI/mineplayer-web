<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinePlayer Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- 顶部最小信息条 -->
  <div id="top-bar">
    <span class="logo">MinePlayer</span>
    <button id="btn-theme" title="主题">&#9790;</button>
  </div>

  <!-- 当前播放浮层（极简） -->
  <div id="now-playing" class="hidden">
    <span id="np-title"></span>
    <span id="np-time"></span>
  </div>

  <!-- 底部迷你控制条 -->
  <div id="mini-controls" class="hidden">
    <button id="btn-prev">&#9664;&#9664;</button>
    <button id="btn-play">&#9654;</button>
    <button id="btn-next">&#9654;&#9654;</button>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
    <button id="btn-mode">&#10227;</button>
  </div>

  <!-- 加载入口 -->
  <div id="drop-zone">
    <div id="drop-inner">
      <div id="drop-icon">&#9835;</div>
      <p>拖拽音频文件到此处</p>
      <label for="file-input" id="btn-load">或点击选择</label>
      <input type="file" id="file-input" accept="audio/*" multiple>
    </div>
  </div>

  <!-- 音量（悬浮右下角） -->
  <div id="vol-float" class="hidden">
    <input type="range" id="volume-bar" min="0" max="100" value="80" step="1" orient="vertical">
  </div>

  <script src="app.js"></script>
</body>
</html>
