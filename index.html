<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知非的音乐厅</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- 开场页 -->
  <div id="welcome">
    <div id="welcome-content">
      <div id="welcome-title">知非的音乐厅</div>
      <div id="welcome-subtitle">沉浸式 3D 音乐可视化</div>
      <button id="welcome-enter">进 入</button>
    </div>
  </div>

  <!-- 主题按钮（右上角，极简） -->
  <button id="btn-theme" title="主题">&#9790;</button>

  <!-- 当前播放浮层 -->
  <div id="now-playing" class="hidden">
    <span id="np-title"></span>
    <span id="np-time"></span>
  </div>

  <!-- 底部迷你控制条 -->
  <div id="mini-controls" class="hidden">
    <button id="btn-prev">&#9664;&#9664;</button>
    <button id="btn-play">&#9654;</button>
    <button id="btn-next">&#9654;&#9654;</button>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
    <button id="btn-mode">&#10227;</button>
  </div>

  <!-- 拖拽入口 -->
  <div id="drop-zone" class="hidden">
    <div id="drop-inner">
      <div id="drop-icon">&#9835;</div>
      <p>拖拽音频文件到此处</p>
      <label for="file-input" id="btn-load">或点击选择</label>
      <input type="file" id="file-input" accept="audio/*" multiple>
    </div>
  </div>

  <!-- 提示 -->
  <div id="hint" class="hidden">拖拽旋转 &middot; 滚轮缩放 &middot; 点击粒子切歌</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
